  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --text: #f0ede8;
      --muted: #555;
    }

    html {
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ===== CUSTOM CURSOR ===== */
    .cursor {
      position: fixed;
      width: 16px;
      height: 16px;
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transition: width 0.3s, height 0.3s, background 0.3s;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }
    .cursor.hover {
      width: 55px;
      height: 55px;
      background: rgba(255,255,255,0.08);
    }
    .cursor-dot {
      position: fixed;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10001;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }

    /* ===== FILM GRAIN ===== */
    .grain {
      position: fixed;
      inset: -100%;
      width: 300%;
      height: 300%;
      z-index: 9998;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grain 0.5s steps(10) infinite;
    }
    @keyframes grain {
      0%, 100% { transform: translate(0,0); }
      10% { transform: translate(-5%,-10%); }
      30% { transform: translate(7%,-25%); }
      50% { transform: translate(-15%,10%); }
      70% { transform: translate(0%,15%); }
      90% { transform: translate(-10%,10%); }
    }

    /* ===== NAV ===== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      mix-blend-mode: difference;
      opacity: 1;
      pointer-events: all;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      font-weight: 500;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 4px;
      background: #fff;
      transition: width 0.4s cubic-bezier(0.25,0.1,0.25,1);
    }
    .nav-links a:hover::after,
    .nav-links a.active::after { width: 100%; }

    /* ===== PHOTO GRID - Staggered floating layout with color gradient ===== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      padding: 60px clamp(24px, 4vw, 60px);
      align-items: start;
    }

    .photo-item {
      position: relative;
      overflow: visible;
      border-radius: 3px;
      opacity: 0;
      filter: blur(8px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1),
                  transform 0.8s cubic-bezier(0.16,1,0.3,1),
                  filter 1.2s cubic-bezier(0.16,1,0.3,1);
      perspective: 600px;
    }
    .photo-item.visible {
      opacity: 1;
      filter: blur(0);
    }

    .photo-item img {
      width: 100%;
      max-height: 85vh;
      object-fit: contain;
      display: block;
      border-radius: 3px;
      filter: brightness(0.88) saturate(0.92);
      transition: transform 0.4s cubic-bezier(0.25,0.1,0.25,1), filter 0.5s, box-shadow 0.4s;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .photo-item:hover img {
      filter: brightness(1) saturate(1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .photo-item .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 50px 14px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      font-size: 0.58rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .photo-item:hover .caption {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== SCROLL PROGRESS ===== */
    .scroll-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      z-index: 600;
      background: linear-gradient(90deg,
        #d4a24e, #f5a623, #c47d7d, #a08060,
        #5a8a5e, #3d9e9e, #6b93b8, #8cb8d4
      );
      background-size: 100% 100%;
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 5000;
      background: rgba(0,0,0,0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
      backdrop-filter: blur(20px);
    }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 2px;
      transform: scale(0.92);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
    }
    .lightbox.active img {
      transform: scale(1);
      opacity: 1;
    }
    .lb-close {
      position: absolute;
      top: 24px; right: 32px;
      background: none; border: none;
      color: #555;
      font-size: 1.5rem;
      cursor: none;
      transition: color 0.3s, transform 0.3s;
      z-index: 5001;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
    }
    .lb-close:hover { color: #fff; transform: rotate(90deg); }
    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: #333;
      font-size: 3rem;
      cursor: none;
      transition: color 0.3s;
      padding: 24px;
      z-index: 5001;
      font-weight: 200;
    }
    .lb-nav:hover { color: #fff; }
    .lb-prev { left: 8px; }
    .lb-next { right: 8px; }
    .lb-info {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .lb-caption {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
    }
    .lb-counter {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: #333;
      margin-top: 4px;
    }

    /* ===== CIRCLE IRIS PAGE TRANSITION ===== */
    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 99999;
      pointer-events: none;
    }
    .transition-ring,
    .transition-fill {
      position: absolute;
      inset: 0;
      will-change: clip-path;
      clip-path: circle(0px at 50% 50%);
      -webkit-clip-path: circle(0px at 50% 50%);
    }
    .transition-fill { background: #080810; }
    .transition-ring { background: #3a5a7a; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .gallery { grid-template-columns: repeat(3, 1fr); padding: 40px clamp(16px, 3vw, 40px); }
    }
    @media (max-width: 768px) {
      .nav { padding: 14px 20px; }
      .nav-links a { font-size: 0.6rem; letter-spacing: 4px; }
      .nav-logo { font-size: 1.2rem; letter-spacing: 4px; }
      .gallery { grid-template-columns: repeat(2, 1fr); padding: 20px 12px; }
      .photo-item { padding: 6px !important; }
      .cursor, .cursor-dot { display: none; }
      body { cursor: auto; }
      .lb-close, .lb-nav { cursor: pointer; }
    }
    /* ===== HAMBURGER MENU ===== */
    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 501;
    }
    .nav-hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: #fff;
      margin: 5px 0;
      transition: transform 0.3s, opacity 0.3s;
    }
    .nav-hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    .nav-hamburger.active span:nth-child(2) {
      opacity: 0;
    }
    .nav-hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    @media (max-width: 480px) {
      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0; right: 0;
        flex-direction: column;
        background: rgba(5, 5, 5, 0.95);
        backdrop-filter: blur(20px);
        padding: 20px 0;
        gap: 0;
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        padding: 14px 40px;
        font-size: 0.75rem;
      }
      .nav-hamburger { display: block; }
      .gallery { grid-template-columns: repeat(2, 1fr); padding: 12px 6px; }
      .photo-item { padding: 4px !important; }
      .photo-item img { transform: none !important; }
    }
  </style>

    // ===== BUILD GALLERY =====
    // Staggered floating layout with infinite loop
    const gallery = document.getElementById('gallery');

    // Seeded random for consistent layout across reloads
    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return s / 2147483647;
      };
    }
    const rand = seededRandom(42);

    function createPhotoItem(photo, globalIdx) {
      const item = document.createElement('div');
      item.className = 'photo-item';

      const yOffset = (rand() - 0.5) * 40;
      const padTop = 10 + rand() * 30;
      const padBottom = 10 + rand() * 30;
      const padLeft = 8 + rand() * 20;
      const padRight = 8 + rand() * 20;
      const scale = 0.88 + rand() * 0.12;
      const rotate = (rand() - 0.5) * 1.6;

      item.style.padding = `${padTop}px ${padRight}px ${padBottom}px ${padLeft}px`;
      item.style.transform = `translateY(${30 + yOffset}px)`;
      item.style.setProperty('--y-offset', `${yOffset}px`);
      item.style.setProperty('--scale', scale);
      item.style.setProperty('--rotate', `${rotate}deg`);
      item.style.transitionDelay = `${(globalIdx % 5) * 0.07}s`;

      item.innerHTML = `
        <img src="thumbs/${photo.file}" alt="${photo.caption}" loading="lazy"
             style="transform: scale(${scale}) rotate(${rotate}deg);">
        <div class="caption">${photo.caption}</div>
      `;
      // Lightbox always uses original photo index
      const photoIdx = globalIdx % photos.length;
      item.addEventListener('click', () => openLightbox(photoIdx));

      // 3D tilt on hover
      item.addEventListener('mousemove', (e) => {
        const rect = item.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        const img = item.querySelector('img');
        img.style.transform = `scale(${scale * 1.04}) rotate(${rotate}deg) rotateY(${x * 12}deg) rotateX(${-y * 12}deg)`;
      });
      item.addEventListener('mouseleave', () => {
        const img = item.querySelector('img');
        img.style.transform = `scale(${scale}) rotate(${rotate}deg)`;
      });

      return item;
    }

    // Initial render
    let totalRendered = 0;
    function appendBatch() {
      const fragment = document.createDocumentFragment();
      photos.forEach((photo, i) => {
        const item = createPhotoItem(photo, totalRendered + i);
        fragment.appendChild(item);
      });
      gallery.appendChild(fragment);

      // Observe new items for scroll reveal + cursor hover
      const newItems = gallery.querySelectorAll('.photo-item:not(.observed)');
      newItems.forEach(el => {
        el.classList.add('observed');
        revealObserver.observe(el);
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });

      totalRendered += photos.length;
    }

    // ===== SCROLL REVEAL =====
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const yOff = entry.target.style.getPropertyValue('--y-offset') || '0px';
          entry.target.style.transform = `translateY(${yOff})`;
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.06, rootMargin: '0px 0px -20px 0px' });

    // ===== INFINITE LOOP =====
    // When user scrolls near the bottom of the gallery, append another cycle
    const loopObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          appendBatch();
          // Move sentinel to end
          gallery.appendChild(sentinel);
        }
      });
    }, { rootMargin: '0px 0px 800px 0px' });

    const sentinel = document.createElement('div');
    sentinel.style.height = '1px';
    sentinel.style.gridColumn = '1 / -1';
    gallery.appendChild(sentinel);

    // ===== CUSTOM CURSOR (must be before appendBatch) =====
    const cursor = document.getElementById('cursor');
    const cursorDot = document.getElementById('cursorDot');
    let mx = 0, my = 0, cx = 0, cy = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      cursorDot.style.left = mx + 'px';
      cursorDot.style.top = my + 'px';
    });

    (function cursorLoop() {
      cx += (mx - cx) * 0.15;
      cy += (my - cy) * 0.15;
      cursor.style.left = cx + 'px';
      cursor.style.top = cy + 'px';
      requestAnimationFrame(cursorLoop);
    })();

    // Cursor hover for static elements
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // First batch + start infinite loop
    appendBatch();
    loopObserver.observe(sentinel);

    // ===== SCROLL PROGRESS =====
    const scrollBar = document.getElementById('scrollBar');
    let ticking = false;

    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
          scrollBar.style.width = `${pct}%`;
          ticking = false;
        });
        ticking = true;
      }
    });

    // ===== LIGHTBOX =====
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCaption = document.getElementById('lbCaption');
    const lbCounter = document.getElementById('lbCounter');
    let idx = 0;

    function openLightbox(i) {
      idx = i;
      show();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function show() {
      const realIdx = ((idx % photos.length) + photos.length) % photos.length;
      const p = photos[realIdx];
      lbImg.src = `photos/${p.file}`;
      lbImg.alt = p.caption;
      lbCaption.textContent = p.caption;
      lbCounter.textContent = `${realIdx + 1} / ${photos.length}`;
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function nav(dir) {
      idx = (idx + dir + photos.length) % photos.length;
      lbImg.style.opacity = '0';
      lbImg.style.transform = `scale(0.95) translateX(${dir * 30}px)`;
      setTimeout(() => {
        show();
        lbImg.style.opacity = '1';
        lbImg.style.transform = 'scale(1) translateX(0)';
      }, 200);
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => nav(-1));
    document.getElementById('lbNext').addEventListener('click', () => nav(1));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') nav(-1);
      if (e.key === 'ArrowRight') nav(1);
    });

    lbImg.style.transition = 'opacity 0.3s, transform 0.4s cubic-bezier(0.16,1,0.3,1)';

    // Active nav link styling
    document.querySelectorAll('.nav-links a').forEach(a => {
      if (a.classList.contains('active')) {
        a.style.color = '#fff';
      }
    });

    // Hamburger menu toggle
    const navHamburger = document.getElementById('navHamburger');
    const navLinks = document.getElementById('navLinks');
    navHamburger.addEventListener('click', () => {
      navHamburger.classList.toggle('active');
      navLinks.classList.toggle('open');
    });

    // ===== CIRCLE IRIS PAGE TRANSITION =====
    (function() {
      'use strict';
      var FILL_DUR = 600, RING_DUR = 550, RING_DELAY = 50, NAV_DELAY = 680;
      var EASE_OUT = 'cubic-bezier(0.16, 1, 0.3, 1)';
      var EASE_IN  = 'cubic-bezier(0.7, 0, 0.84, 0)';
      var ring = document.getElementById('transRing');
      var fill = document.getElementById('transFill');
      var navigating = false;

      function maxR(x, y) {
        var w = window.innerWidth, h = window.innerHeight;
        return Math.ceil(Math.hypot(Math.max(x, w - x), Math.max(y, h - y)));
      }

      function setClip(el, val) {
        el.style.clipPath = val;
        el.style.webkitClipPath = val;
      }

      function exitTransition(href, cx, cy) {
        if (navigating) return;
        navigating = true;
        var r = maxR(cx, cy);
        var o = cx + 'px ' + cy + 'px';
        var start = 'circle(0px at ' + o + ')';
        var end = 'circle(' + r + 'px at ' + o + ')';

        try { sessionStorage.setItem('iris_x', cx); sessionStorage.setItem('iris_y', cy); } catch(e) {}

        ring.style.transition = 'none'; fill.style.transition = 'none';
        setClip(ring, start); setClip(fill, start);
        void ring.offsetHeight;

        ring.style.transition = 'clip-path ' + RING_DUR + 'ms ' + EASE_IN + ', -webkit-clip-path ' + RING_DUR + 'ms ' + EASE_IN;
        fill.style.transition = 'clip-path ' + FILL_DUR + 'ms ' + EASE_IN + ' ' + RING_DELAY + 'ms, -webkit-clip-path ' + FILL_DUR + 'ms ' + EASE_IN + ' ' + RING_DELAY + 'ms';
        setClip(ring, end); setClip(fill, end);
        ring.parentElement.style.pointerEvents = 'all';

        setTimeout(function() { window.location.href = href; }, NAV_DELAY);
      }

      function enterTransition() {
        var cx, cy;
        try { cx = parseFloat(sessionStorage.getItem('iris_x')); cy = parseFloat(sessionStorage.getItem('iris_y')); sessionStorage.removeItem('iris_x'); sessionStorage.removeItem('iris_y'); } catch(e) {}
        if (isNaN(cx) || isNaN(cy)) { cx = window.innerWidth / 2; cy = window.innerHeight / 2; }

        var r = maxR(cx, cy);
        var o = cx + 'px ' + cy + 'px';
        var full = 'circle(' + r + 'px at ' + o + ')';
        var zero = 'circle(0px at ' + o + ')';

        ring.style.transition = 'none'; fill.style.transition = 'none';
        setClip(ring, full); setClip(fill, full);
        void ring.offsetHeight;

        requestAnimationFrame(function() { requestAnimationFrame(function() {
          fill.style.transition = 'clip-path ' + FILL_DUR + 'ms ' + EASE_OUT + ', -webkit-clip-path ' + FILL_DUR + 'ms ' + EASE_OUT;
          ring.style.transition = 'clip-path ' + RING_DUR + 'ms ' + EASE_OUT + ' ' + RING_DELAY + 'ms, -webkit-clip-path ' + RING_DUR + 'ms ' + EASE_OUT + ' ' + RING_DELAY + 'ms';
          setClip(fill, zero); setClip(ring, zero);

          setTimeout(function() {
            ring.style.transition = 'none'; fill.style.transition = 'none';
            ring.parentElement.style.pointerEvents = '';
            navigating = false;
          }, Math.max(FILL_DUR, RING_DUR + RING_DELAY) + 100);
        }); });
      }

      document.querySelectorAll('a[href]').forEach(function(link) {
        var href = link.getAttribute('href');
        if (href && href.endsWith('.html') && !href.startsWith('http') && !href.startsWith('mailto')) {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            var rect = link.getBoundingClientRect();
            var x = e.clientX || (rect.left + rect.width / 2);
            var y = e.clientY || (rect.top + rect.height / 2);
            exitTransition(href, x, y);
          });
        }
      });

      window.addEventListener('pageshow', function(e) { if (e.persisted) { navigating = false; enterTransition(); } });
      enterTransition();
    })();
  </script>

</body>
</html>
